services:
  db:
    image: postgres:15
    container_name: blackcreekfarm-db
    restart: always
    environment:
      POSTGRES_DB: blackcreekfarm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: blackcreekfarm-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blackcreek.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  pgdata:
