name: Run Tests
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: blackcreekfarm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      DATABASE_URL: postgres://user:user@localhost:5432/blackcreekfarm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.6'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Run tests
        run: |
          source venv/bin/activate
          make test