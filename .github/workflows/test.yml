name: Run Tests
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Postgres
        run: |
          until pg_isready --host=postgres --port=5432 --username=user --dbname=blackcreekfarm --quiet; do
            echo "⏳ Waiting for database..."
            sleep 2
          done
          echo "✅ PostgreSQL is ready!"

      - name: Run migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Run tests
        run: |
          source venv/bin/activate
          make test