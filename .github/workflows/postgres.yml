name: Setup Postgres
on:
  workflow_call:

jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: blackcreekfarm
          POSTGRES_USER: user
          POSTGRES_PASSWORD: user
        options: >-
          --health-cmd="pg_isready -U user -d blackcreekfarm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: ✔️ Wait for Postgres to be ready
        run: |
          echo "⏳ Waiting for PostgreSQL to accept connections..."
          until pg_isready --host=postgres --port=5432 --username=user --dbname=blackcreekfarm --quiet; do
            sleep 2
          done
          echo "✅ PostgreSQL is ready!"