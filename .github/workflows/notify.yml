name: Discord Notifications
on:
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: ✔️ Notify Discord on PR merge success (Prod only)
        if: ${{ success() && github.event.pull_request.merged == true && github.base_ref == 'Prod' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"✅ *${{ github.event.pull_request.title }}* on branch **${{ env.BRANCH_NAME }}** passed all checks and was launched to **Production** by **${{ github.actor }}** 🚀 Someone call NASA — mission accomplished!\"
               }" \
               $DISCORD_WEBHOOK_URL

      - name: ✔️ Notify Discord on Failure
        if: ${{ failure() && github.event_name == 'pull_request' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"💀 *${{ github.event.pull_request.title }}* on branch **${{ env.BRANCH_NAME }}** crashed and burned.\\n**${{ github.actor }}**, you broke the build again. Time to debug, legend. 🧩\"
               }" \
               $DISCORD_WEBHOOK_URL