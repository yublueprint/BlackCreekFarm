name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.6'

      # 3. Install dependencies
      - name: Install dependencies
        run: make build

      # 4. Run tests
      - name: Run tests
        run: make test

      # ✅ Notify only when PR merged into Prod successfully
      - name: Notify Discord on PR merge success (Prod only)
        if: ${{ success() && github.event.pull_request.merged == true && github.base_ref == 'Prod' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"🎉 *${{ github.event.pull_request.title }}* passed all checks and was launched to **Production** by **${{ github.actor }}** 🚀 Someone call NASA — mission accomplished!\"
               }" \
               $DISCORD_WEBHOOK_URL

      # 💀 Notify on failure for any PR
      - name: Notify Discord on failure
        if: ${{ failure() && github.event_name == 'pull_request' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"💀 *${{ github.event.pull_request.title }}* crashed and burned.\n**${{ github.actor }}**, you broke the build again. Time to debug, legend. 🧩\"
               }" \
               $DISCORD_WEBHOOK_URL
