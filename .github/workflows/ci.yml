name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.6'

      # 3. Install dependencies
      - name: Install dependencies
        run: make build

      # 4. Run tests
      - name: Run tests
        run: make test

      # 5. Notify Discord on failure (Prod only)
      - name: Notify Discord on failure (Prod only)
        if: failure() && github.ref_name == 'Prod'
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"⚠️ CI failed on branch **${GITHUB_REF_NAME}** by **${{ github.actor }}**\"}" \
               $DISCORD_WEBHOOK_URL

      # 6. Notify Discord on success (Prod only)
      - name: Notify Discord on success (Prod only)
        if: success() && github.ref_name == 'Prod'
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"🚀 New feature pushed to **${GITHUB_REF_NAME}** by **${{ github.actor }}** — CI passed ✅\"}" \
               $DISCORD_WEBHOOK_URL
