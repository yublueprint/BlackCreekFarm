name: "CI Pipeline"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  # ✔️ Run all tests (includes Postgres setup and migrations)
  test:
    uses: ./.github/workflows/test.yml

  # ✔️ Send Discord notifications after tests
  notify:
    needs: test
    uses: ./.github/workflows/notify.yml