name: "CI Pipeline"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      POSTGRES_DB: blackcreekfarm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      DATABASE_URL: postgres://user:user@localhost:5432/blackcreekfarm

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: blackcreekfarm
          POSTGRES_USER: user
          POSTGRES_PASSWORD: user
        options: >-
          --health-cmd="pg_isready -U user -d blackcreekfarm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.6'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Wait for Postgres
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U user -d blackcreekfarm; do
            echo "⏳ Waiting for database..."
            sleep 2
          done
          echo "✅ Database is ready!"

      # Run migrations
      - name: Run migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      # Run tests
      - name: Run tests
        run: |
          source venv/bin/activate
          make test

      # Run linter
      - name: Run flake8 linter
        run: |
          source venv/bin/activate
          flake8 app --max-line-length 99

      # Notify Discord on PR merge success (Prod only)
      - name: Notify Discord on PR merge success (Prod only)
        if: ${{ success() && github.event.pull_request.merged == true && github.base_ref == 'Prod' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"✅ *\\\"${{ github.event.pull_request.title }}\\\"* passed all checks and was launched to **Production** by **${{ github.actor }}** 🚀 Someone call NASA — mission accomplished!\"
               }" \
               $DISCORD_WEBHOOK_URL

      # Notify Discord on failure (tests or lint)
      - name: Notify Discord on failure
        if: ${{ (needs.test.result != 'success' || needs.lint.result != 'success') && github.base_ref == 'Prod' }}
        run: |
          curl -H "Content-Type: application/json" \
               -d "{
                 \"content\": \"💀 *\\\"${{ github.event.pull_request.title }}\\\"* failed checks.\\n**${{ github.actor }}**, check tests or lint errors!\"
               }" \
               $DISCORD_WEBHOOK_URL
