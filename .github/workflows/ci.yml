name: "CI Pipeline"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: blackcreekfarm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      DATABASE_URL: postgres://user:user@postgres:5432/blackcreekfarm
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: blackcreekfarm
          POSTGRES_USER: user
          POSTGRES_PASSWORD: user
        options: >-
          --health-cmd="pg_isready -U user -d blackcreekfarm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python environment
        uses: ./.github/actions/setup-python

      # 3️⃣ Wait for Postgres to be ready
      - name: Setup database
        uses: ./.github/actions/setup-database

      # 4️⃣ Run migrations and tests
      - name: Run tests
        uses: ./.github/actions/run-tests

      # 5️⃣ Send Discord notification (always runs)
      - name: Notify Discord
        if: ${{ always() }}
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          pr_title: ${{ github.event.pull_request.title }}
          actor: ${{ github.actor }}
          job_status: ${{ job.status }}
          is_merged: ${{ github.event.pull_request.merged }}
          base_ref: ${{ github.base_ref }}