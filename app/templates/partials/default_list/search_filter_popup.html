<!-- Search Filter Popup Form -->
<div id="searchFilterPopup" class="hidden fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded shadow-md w-full max-w-lg flex-1 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between w-full mb-5">
            <div class="w-1/2">
                <h3 class="text-2xl py-1 mb-4">Filters</h3>
            </div>
            <div class="">
                <div id="closeSearchFormButton">
                    <div class="bg-gray-300 text-gray-800 py-2 px-4 shadow-sm rounded-full hover:bg-gray-400 cursor-pointer">
                        x
                    </div>
                </div>
            </div>
        </div>
        <form method="get" action="{% url list_url_given %}">
            <div id="searchForm" class="flex-col space-y-2">
                {{ form_inside|safe }}
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-2 justify-between w-full mt-8">
                <div>
                    <button type="submit" class="bg-green-700 text-white py-2 px-4 rounded hover:bg-green-800">
                        Apply Filters
                    </button>
                </div>
                <div id="clearAllSearchFiltersButton" onclick="clearSearchFilters()">
                    <div class="bg-transparent text-gray-800 py-2 px-4 rounded hover:bg-gray-400 cursor-pointer">
                        Clear Filters
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
