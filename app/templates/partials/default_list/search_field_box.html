<!-- Search Field Box -->
<form action="{% url list_url_given %}" method="get" class="flex items-center gap-2 rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 w-fit mb-4">
    <!-- Search Icon -->
    <svg
    xmlns="http://www.w3.org/2000/svg"
    class="h-4 w-4 text-gray-400"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    >
    <path
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="2"
    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
    />
    </svg>

    <!-- Input -->
    <input
    type="text"
    name="name"
    placeholder="Search in database"
    class="bg-transparent text-sm text-gray-600 placeholder-gray-400 outline-none"
    />
    
    <!-- Filter Button -->
    <div id="searchFilterButton" class="text-gray-400 hover:text-gray-600">
        <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        >
        <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
        />
        </svg>
    </div>
</form>
