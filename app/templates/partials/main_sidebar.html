{% load static %}

<!-- Sidebar -->
<aside class="w-full md:w-64 bg-white shadow-md flex flex-col md:h-full overflow-y-auto">
    <div class="p-6 flex-grow flex flex-col justify-between md:justify-start items-center md:items-stretch">
        <!-- BRAND AND MENU BUTTON -->
        <div class="w-full flex flex-row justify-between md:justify-start items-center md:items-stretch">
            <!-- BRAND LOGO -->
            <div class="max-w-[208px] text-xl font-bold md:mb-6 flex flex-row items-center justify-center md:items-stretch">
                <img class="w-full" src="{% static 'imgs/blackcreek-logo.png' %}" />
            </div>
            <!-- MENU BUTTON -->
            <div class="flex flex-row space-x-6 items-center md:hidden md:items-stretch">
                <a href="{% url 'alerts_list' %}" class="block md:hidden">
                    <i class="fa-solid fa-inbox fa-xl"></i>
                </a>
                <button id="menu-btn" onclick="navButton()" class="block md:hidden focus:outline-none hover:text-indigo-200" aria-label="Toggle Menu">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>  
                </button>
            </div>
        </div>
        <!-- MENU LINKS -->
        <nav id="menu-links" class="w-full hidden mt-8 md:mt-0 md:block md:flex flex-col space-y-1">
            <!-- Overview - highlighted in green -->
            <a href="{% url 'dashboard' %}"
                class="block text-gray-700 p-3 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-[#DBED9E]{% else %}bg-[#DBED9E]{% endif %}">
                <i class="fas fa-chart-line mr-3"></i>Overview
            </a>
    
            <!-- STOCK category label -->
            <div class="pt-2 pb-0 md:pt-4 md:pb-2">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">STOCK</span>
            </div>
    
            <!-- Stock items -->
            <a href="{% url 'livestock_list' %}"
                class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'livestock_list' %}bg-gray-200{% endif %}">
                <i class="fas fa-paw mr-3"></i>Livestock
            </a>
            <a href="{% url 'crop_list' %}"
                class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'crop_list' %}bg-gray-200{% endif %}">
                <i class="fas fa-seedling mr-3"></i>Crops
            </a>
            <a href="{% url 'equipment_list' %}"
                class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'equipment_list' %}bg-gray-200{% endif %}">
                <i class="fas fa-cog mr-3"></i>Equipment
            </a>
            <a href="/supplies/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'supplies_list' %}bg-gray-200{% endif %}">
                <i class="fas fa-truck mr-3"></i>Supplies
            </a>
            <a href="/transactions/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'transaction_list' %}bg-gray-200{% endif %}">
                <i class="fas fa-dollar-sign mr-3"></i>Transactions
            </a>
            <a href="/reports/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'reports' %}bg-gray-200{% endif %}">
                <i class="fas fa-folder mr-3"></i>Reports
            </a>
        </nav>
    </div>

    <div id="logoutButton" class="w-full hidden md:block px-4 pb-2 md:px-4 md:py-4 md:border-t">
        <a href="{% url 'logout' %}" class="block text-red-600 hover:bg-red-100 p-3 rounded font-medium">
            <i class="fas fa-sign-out-alt mr-2"></i>Logout
        </a>
    </div>
</aside>
