<div class="mb-8">
    <a 
        id="{{ button_id }}" 
        href="{{ button_url }}"
        onclick="urlButtonStyling('{{ button_id }}')"
        class="inline-flex space-x-2 items-center justify-center bg-green-700 text-white py-2 px-4 rounded hover:bg-green-800"
    >
        <span class="btn-text">{{ button_text }}</span>
    </a>
</div>
