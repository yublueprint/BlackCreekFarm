<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}BlackCreek Sync{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="../static/css/styles.css">

    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="font-sans text-black bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r flex flex-col h-full justify-between">
            <div class="p-4">
                <h1 class="mb-6">
                    <img class="w-full"
                        src="https://www.blackcreekfarm.ca/custom/uploads/2018/12/logo-all_horizonalt.png"
                        alt="Black Creek Community Farm Logo" />
                </h1>

                <nav class="space-y-1 text-sm">
                    <a href="{% url 'dashboard' %}"
                        class="flex items-center px-3 py-2 rounded-md bg-lime-200 text-black">
                            <i class="fas fa-chart-line mr-2"></i> Overview
                    </a>

                    <!-- Headings -->
                    <div class="text-xs uppercase text-gray-500 mt-4 mb-2">Stock</div>

                    <a href="{% url 'livestock_list' %}"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 {% if request.resolver_match.url_name == 'livestock_list' %}bg-neutral-200 text-black{% else %}text-black{% endif %}">
                            <i class="fas fa-cow mr-2"></i> Livestock
                    </a>
                    <a href="{% url 'crop_list' %}"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 {% if request.resolver_match.url_name == 'crop_list' %}bg-neutral-200 text-black{% else %}text-black{% endif %}">
                            <i class="fas fa-seedling mr-2"></i> Crops
                    </a>
                    <a href="{% url 'equipment_list' %}"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 {% if request.resolver_match.url_name == 'equipment_list' %}bg-neutral-200 text-black{% else %}text-black{% endif %}">
                            <i class="fas fa-tractor mr-2"></i> Equipment
                    </a>
                    <a href="/supplies/"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 text-black">
                            <i class="fas fa-box-open mr-2"></i> Supplies
                    </a>
                    <a href="/transactions/"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 text-black">
                            <i class="fas fa-dollar-sign mr-2"></i> Transactions
                    </a>
                    <a href="/reports/"
                        class="flex items-center px-3 py-2 rounded-md hover:bg-neutral-100 bg-neutral-200 text-black">
                            <i class="fas fa-file-alt mr-2"></i> Reports
                    </a>
                </nav>
            </div>

            <!-- Logout -->
            <div class="p-4 border-t">
                <a href="{% url 'logout' %}" class="flex items-center px-3 py-2 text-black text-sm hover:text-red-600">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
