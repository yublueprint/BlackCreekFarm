<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}BlackCreek Sync{% endblock %}</title>

    <!-- Importing Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Importing Theme Stylesheet -->
    <link rel="stylesheet" href="../static/css/styles.css">

    <!-- Google Fonts for Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <!-- Importing Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="app-theme">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md flex flex-col h-full">
            <div class="p-6 flex-grow">
                <h1 class="text-xl font-bold mb-6">
                    <img class="w-full"
                        src="https://apos-aka-blackcreek-prod.s3.ca-central-1.amazonaws.com/apos-frontend/releases/07208929651899572/default/modules/theme-default/images/black-creek-community-farm-logo-black.png" />
                </h1>

                <nav class="space-y-1">
                    <!-- Overview - highlighted in green -->
                    <a href="{% url 'dashboard' %}"
                        class="block text-gray-700 p-3 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-[#DBED9E]{% else %}bg-[#DBED9E]{% endif %}">
                        <i class="fas fa-chart-line mr-3"></i>Overview
                    </a>

                    <!-- STOCK category label -->
                    <div class="pt-4 pb-2">
                        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">STOCK</span>
                    </div>

                    <!-- Stock items -->
                    <a href="{% url 'livestock_list' %}"
                        class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'livestock_list' %}bg-gray-200{% endif %}">
                        <i class="fas fa-paw mr-3"></i>Livestock
                    </a>
                    <a href="{% url 'crop_list' %}"
                        class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'crop_list' %}bg-gray-200{% endif %}">
                        <i class="fas fa-seedling mr-3"></i>Crops
                    </a>
                    <a href="{% url 'equipment_list' %}"
                        class="block text-gray-700 hover:bg-gray-100 p-3 rounded {% if request.resolver_match.url_name == 'equipment_list' %}bg-gray-200{% endif %}">
                        <i class="fas fa-cog mr-3"></i>Equipment
                    </a>
                    <a href="/supplies/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded">
                        <i class="fas fa-truck mr-3"></i>Supplies
                    </a>
                    <a href="/transactions/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded">
                        <i class="fas fa-dollar-sign mr-3"></i>Transactions
                    </a>

                    <!-- Reports - highlighted in gray -->
                    <a href="/reports/" class="block text-gray-700 hover:bg-gray-100 p-3 rounded">
                        <i class="fas fa-folder mr-3"></i>Reports
                    </a>
                </nav>
            </div>

            <div class="p-4 border-t">
                <a href="{% url 'logout' %}" class="block text-red-600 hover:bg-red-100 p-2 rounded font-medium">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
