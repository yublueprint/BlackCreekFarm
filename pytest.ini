[tool:pytest]
# Tell pytest this is a Django project
DJANGO_SETTINGS_MODULE = config.settings

# What files contain tests
python_files = tests.py test_*.py *_tests.py

# How to find test classes and functions
python_classes = Test*
python_functions = test_*

# Extra options for running tests
addopts = --tb=short --strict-markers --reuse-db

# Where to look for tests
testpaths = tests

# Types of tests we can mark
markers =
    e2e: End-to-end tests
    unit: Unit tests
    slow: Slow running tests
DJANGO_ALLOW_ASYNC_UNSAFE=true
[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
testpaths = app/tests
addopts = --reuse-db -v
django_find_project = false
